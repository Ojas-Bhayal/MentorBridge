<!-- views/signup.html -->
<div class="login-wrapper">
    <div class="logo-container">
        <h1>MentorBridge</h1>
        <p class="subtitle">Join the learning ecosystem</p>
    </div>

    <div class="glass-panel">
        <div class="alert success" ng-if="success">
            {{ success }}
        </div>
        <div class="alert" ng-if="error">
            {{ error }}
        </div>
        <form name="signupForm" ng-submit="register()">
            <div class="form-group">
                <label>Full Name</label>
                <input class="form-control" type="text" ng-model="user.name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input class="form-control" type="email" ng-model="user.email" placeholder="email@test.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input class="form-control" type="password" ng-model="user.password" placeholder="••••••••" ng-minlength="8" required>
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <select class="form-control" ng-model="user.role_id" ng-options="role.role_id as role.role_name for role in roles" required>
                    <option value="" disabled>Select your role</option>
                </select>
            </div>
            <div class="form-group" ng-if="isMentorSelected()">
                <label>Mentor Invite Code</label>
                <input class="form-control" type="text" ng-model="user.invite_code" placeholder="MENTOR-INVITE-2026" ng-required="isMentorSelected()">
            </div>
            <button type="submit" class="btn" style="margin-bottom: 1rem">Create Account</button>
            <div style="text-align: center;">
                <a href="#!/login" class="form-note">Already have an account? Login</a>
            </div>
        </form>
    </div>
</div>
