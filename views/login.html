<!-- views/login.html -->
<div class="login-wrapper">
    <div class="logo-container">
        <h1>MentorBridge</h1>
        <p class="subtitle">Connect, Grow, Succeed</p>
    </div>

    <div class="glass-panel">
        <div class="alert success" ng-if="success">
            {{ success }}
        </div>
        <div class="alert" ng-if="error">
            {{ error }}
        </div>
        <form ng-submit="login()">
            <div class="form-group">
                <label>Email</label>
                <input class="form-control" type="email" ng-model="user.email" placeholder="student@test.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input class="form-control" type="password" ng-model="user.password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <p class="form-note">
            New here? <a href="#!/signup">Create an account</a>.
        </p>
    </div>
</div>
